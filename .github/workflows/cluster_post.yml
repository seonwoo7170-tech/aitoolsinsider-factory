name: Sovereign X Auto Post
on:
  schedule: [{cron: "00 06 * * *"}]
  workflow_dispatch: {}
jobs:
  post:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Bootstrap Secrets
        run: |
          if [ -f bootstrap_secrets.json ]; then
            jq -r 'to_entries[] | "\(.key)=\(.value)"' bootstrap_secrets.json | while read line; do gh secret set "${line%%=*}" --body "${line#*=}"; done
            rm bootstrap_secrets.json
            git config --global user.name 'Sovereign Bot'; git config --global user.email 'bot@sovereign.x'
            git add .; git commit -m 'chore: cleanup secrets [skip ci]' || true; git push origin main || true
          fi
        env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install googleapis axios form-data canvas
      - env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}; GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}; KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}; GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}; GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}; GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}; GITHUB_REPOSITORY: ${{ github.repository }}
        run: node cluster_engine.js